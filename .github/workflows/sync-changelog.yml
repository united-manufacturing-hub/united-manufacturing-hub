name: Sync Changelog

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Run without creating PR (just logs output)'
        required: false
        default: 'false'
        type: boolean
      version:
        description: 'Version to sync (e.g., v0.44.8). Required for workflow_dispatch.'
        required: false
        type: string
      title:
        description: 'Title for the changelog entry (5-10 words). If omitted for release events, fetched from the GitHub release.'
        required: false
        type: string

jobs:
  sync:
    if: ${{ github.event_name == 'workflow_dispatch' || !github.event.release.prerelease }}
    name: Sync to changelog.umh.app
    runs-on: depot-ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Determine version
        id: version
        env:
          EVENT_NAME: ${{ github.event_name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          if [ "$EVENT_NAME" = "release" ]; then
            echo "version=$RELEASE_TAG" >> $GITHUB_OUTPUT
          else
            if [ -z "$INPUT_VERSION" ]; then
              echo "Error: version input is required for workflow_dispatch"
              exit 1
            fi
            echo "version=$INPUT_VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Get release title
        id: release-title
        env:
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_TITLE: ${{ github.event.inputs.title }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ -n "$INPUT_TITLE" ]; then
            title="$INPUT_TITLE"
          elif [ "$EVENT_NAME" = "release" ]; then
            raw="${RELEASE_NAME:-$RELEASE_TAG}"
            # Strip version prefix: "v0.44.12 - Title" -> "Title"
            title=$(echo "$raw" | sed -E 's/^v?[0-9]+\.[0-9]+\.[0-9]+[[:space:]]*-[[:space:]]*//')
            # If stripping didn't change anything (no version prefix), keep raw
            if [ "$title" = "$raw" ]; then
              title="$raw"
            fi
          fi
          if [ -z "$title" ]; then
            echo "Error: No title found. Create a GitHub release with format 'v0.44.12 - Descriptive Title', or pass --title via workflow_dispatch."
            exit 1
          fi
          echo "title=$title" >> $GITHUB_OUTPUT

      - name: Checkout umh-core
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          path: umh-core

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2
        with:
          app-id: ${{ secrets.CHANGELOG_SYNC_APP_ID }}
          private-key: ${{ secrets.CHANGELOG_SYNC_APP_PK }}
          repositories: changelog.umh.app

      - name: Checkout changelog.umh.app
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: united-manufacturing-hub/changelog.umh.app
          token: ${{ steps.app-token.outputs.token }}
          path: changelog-app

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: changelog-app
        run: npm ci

      - name: Run sync script
        working-directory: changelog-app
        env:
          SYNC_VERSION: ${{ steps.version.outputs.version }}
          SYNC_TITLE: ${{ steps.release-title.outputs.title }}
        run: |
          npx tsx .github/scripts/sync-changelog.ts \
            --repo umh-core \
            --version "$SYNC_VERSION" \
            --title "$SYNC_TITLE" \
            --changelog-path ../umh-core/umh-core/CHANGELOG.md \
            --images-path ../umh-core/umh-core/changelog-images \
            --output-path public/changelog/entries

      - name: Show output (dry run)
        if: github.event.inputs.dry_run == 'true'
        working-directory: changelog-app
        run: |
          echo "=== Generated files ==="
          git status --short
          echo ""
          echo "=== New entry content ==="
          git diff --no-color
          echo ""
          for f in $(git ls-files --others --exclude-standard); do
            echo "=== $f ==="
            cat "$f"
            echo ""
          done

      - name: Create Pull Request
        if: github.event.inputs.dry_run != 'true'
        id: create-pr
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
        with:
          token: ${{ steps.app-token.outputs.token }}
          path: changelog-app
          branch: sync/umh-core-${{ steps.version.outputs.version }}
          title: "sync: umh-core ${{ steps.version.outputs.version }}"
          body: |
            Automated sync of changelog entries from umh-core ${{ steps.version.outputs.version }}.

            Generated by the [sync-changelog workflow](https://github.com/united-manufacturing-hub/united-manufacturing-hub/actions/workflows/sync-changelog.yml).
          commit-message: "sync: add umh-core ${{ steps.version.outputs.version }} changelog entry"
          delete-branch: true

      - name: Enable auto-merge
        if: github.event.inputs.dry_run != 'true' && steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ steps.create-pr.outputs.pull-request-number }}
        run: |
          gh pr merge "$PR_NUMBER" \
            --repo united-manufacturing-hub/changelog.umh.app \
            --auto --squash
