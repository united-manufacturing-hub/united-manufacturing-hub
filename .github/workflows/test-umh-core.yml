name: Test UMH Core

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: true

on:
  workflow_call:
    inputs:
      run-integration-tests:
        description: "Whether to run integration tests"
        type: boolean
        default: true
  workflow_dispatch:
    inputs:
      run-integration-tests:
        description: "Whether to run integration tests"
        type: boolean
        default: true

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: depot-ubuntu-24.04
    defaults:
      run:
        working-directory: ./umh-core
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "umh-core/go.mod"
          cache-dependency-path: |
            umh-core/go.sum

      - name: Install ginkgo and nilaway
        run: make install

      - name: Get dependencies
        working-directory: ./umh-core
        run: |
          make download-docker-binaries

      - name: Run unit tests
        run: make unit-test

      - name: Add report to Summary
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: failure()
        with:
          name: Unit Test Results
          path: "umh-core/unit-test-report*.xml"
          reporter: java-junit
          fail-on-error: false

      - name: Upload test report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: unit-test-report
          path: |
            umh-core/unit-test-report.xml
            umh-core/unit-test-report-parallel.xml
          retention-days: 1

  integration-tests:
    name: Integration Tests
    if: inputs.run-integration-tests != false
    runs-on: depot-ubuntu-24.04-4
    strategy:
      matrix:
        instance: [1, 2, 3]
      fail-fast: true
    defaults:
      run:
        working-directory: ./umh-core
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Login to Docker Hub
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        env:
          DOCKER_READ_ONLY_PAT: ${{ secrets.DOCKER_READ_ONLY_PAT }}
          DOCKER_READ_ONLY_USER: ${{ secrets.DOCKER_READ_ONLY_USER }}
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_READ_ONLY_USER }}
          password: ${{ secrets.DOCKER_READ_ONLY_PAT }}

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: "umh-core/go.mod"
          cache-dependency-path: |
            umh-core/go.sum

      - name: Install ginkgo and nilaway
        run: make install

      - name: Get dependencies
        working-directory: ./umh-core
        run: |
          make download-docker-binaries

      - name: Stop containers & cleanup
        working-directory: ./umh-core
        run: |
          make cleanup-ci

      - name: Run integration tests
        env:
          CI: true
          FORCE_DOCKER: true # Force Docker usage since image is built with docker buildx
          VERSION: ${{ github.ref_name }}
        run: make integration-test

      - name: Add report to Summary
        uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3.0.0
        if: failure()
        with:
          name: Integration Test Results (${{ matrix.instance }})
          path: umh-core/integration-test-report.xml
          reporter: java-junit
          fail-on-error: false

      - name: Upload test report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: always()
        with:
          name: integration-test-report-${{ matrix.instance }}
          path: umh-core/integration-test-report.xml
          retention-days: 1

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: logs-${{ matrix.instance }}.zip
          path: /tmp/logs
          retention-days: 1

      - name: Stop containers & cleanup
        if: always()
        working-directory: ./umh-core
        run: |
          make cleanup-ci

  test-report:
    name: Consolidated Test Report
    needs: [unit-tests, integration-tests]
    if: always() && github.event_name == 'pull_request'
    runs-on: depot-ubuntu-24.04
    permissions:
      pull-requests: write
    steps:
      - name: Download all test reports
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: "*-test-report*"
          path: test-reports
          merge-multiple: false

      - name: List downloaded reports
        run: find test-reports -name "*.xml" -type f

      - name: Merge JUnit reports
        run: |
          mkdir -p merged-reports
          go install github.com/nezorflame/junit-merger@v1.0.0

          $(go env GOPATH)/bin/junit-merger -o merged-reports/combined-test-report.xml test-reports/**/*.xml

      - name: Add consolidated report to PR
        uses: ctrf-io/github-test-reporter@024bc4b64d997ca9da86833c6b9548c55c620e40 # v1.0.26
        with:
          report-path: merged-reports/combined-test-report.xml
          title: "UMH Core Test Results"
          summary: true
          pull-request: true
          overwrite-comment: true
          annotate: true
          summary-report: true
          failed-folded-report: true
          flaky-report: true
          insights-report: true
          flaky-rate-report: true
          fail-rate-report: true
          fetch-previous-results: true
          integrations-config: |
            {
              "junit-to-ctrf": {
                "enabled": true,
                "action": "convert",
                "options": {
                  "output": "./ctrf-reports/ctrf-report.json",
                  "toolname": "junit-to-ctrf",
                  "useSuiteName": true,
                  "env": {
                    "appName": "umh-core"
                  }
                }
              }
            }
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
