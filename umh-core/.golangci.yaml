version: "2"

run:
  concurrency: 2

linters:
  # Default set of linters.
  # The value can be: `standard`, `all`, `none`, or `fast`.
  # Default: standard
  default: standard

  enable:
    - canonicalheader
    - copyloopvar
    - dupword
    - errorlint
    - exptostd
    - ginkgolinter
    - gocritic
    - godot
    - goheader
    - iface
    - importas
    - intrange
    - mirror
    - misspell
    - nakedret
    - nlreturn
    - nolintlint
    - perfsprint
    - protogetter
    - sloglint
    - tagalign
    - testifylint
    - unconvert
    - usestdlibvars
    - usetesting
    - whitespace
    - wsl_v5

  exclusions:
    rules:
      # The deprecation godoc on config.DesiredState exempts supervisor/testutil
      # as the named legacy test-helper location. Per-package test mocks across
      # the fsmv2 tree follow the same pattern, so suppress SA1019 at every
      # test-mock use site instead of annotating each individually.
      #
      # TODO(L9): remove once supervisor/testutil and per-package test mocks
      # migrate to fsmv2.WrappedDesiredState[TConfig].
      - path: _test\.go
        linters:
          - staticcheck
        text: "SA1019:.*config.DesiredState is deprecated"
      - path: supervisor/testutil/
        linters:
          - staticcheck
        text: "SA1019:.*config.DesiredState is deprecated"
