---
name: Go Code Analysis

on:
  pull_request:
    branches:
      - "**"
  merge_group:

jobs:
  changes:
    name: Detect Changes
    runs-on: depot-ubuntu-24.04
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: |
            code:
              - 'umh-core/**'
              - 'Makefile'
              - '.github/workflows/go-analysis.yml'
              - '!umh-core/CHANGELOG.md'
              - '!umh-core/changelog-images/**'

  vet:
    name: Go Vet
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: depot-ubuntu-24.04
    defaults:
      run:
        working-directory: ./umh-core

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@v6
        with:
          go-version-file: umh-core/go.mod
          cache: true

      - name: Run go vet
        run: make vet

  nilaway:
    name: Nilaway Analysis
    needs: changes
    if: needs.changes.outputs.code == 'true'
    runs-on: depot-ubuntu-24.04
    defaults:
      run:
        working-directory: ./umh-core

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: umh-core/go.mod
          cache: true

      - name: Install nilaway
        run: go install go.uber.org/nilaway/cmd/nilaway@latest

      - name: Run nilaway
        run: make nilaway

  required-checks:
    name: Analysis Required Checks
    needs: [changes, vet, nilaway]
    if: always()
    runs-on: depot-ubuntu-24.04
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.changes.result }}" != "success" ]; then
            echo "check-changes failed"
            exit 1
          fi
          if [ "${{ needs.changes.outputs.code }}" == "true" ]; then
            if [ "${{ needs.vet.result }}" != "success" ]; then
              echo "vet failed"
              exit 1
            fi
            if [ "${{ needs.nilaway.result }}" != "success" ]; then
              echo "nilaway failed"
              exit 1
            fi
          fi
          echo "All required checks passed"
