# Populates GitHub Release notes from CHANGELOG.md on stable releases.
# Extracted from build-umh-core.yml to avoid granting contents:write
# in the reusable-workflow (workflow_call) path used by pull-request.yml.

name: Update GitHub Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Tag to update (e.g., v0.44.10). Must already exist as a GitHub Release.'
        required: true
        type: string

jobs:
  update-github-release:
    if: ${{ github.event_name == 'workflow_dispatch' || !github.event.release.prerelease }}
    runs-on: depot-ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.version || github.event.release.tag_name }}

      - name: Extract changelog section
        id: changelog
        env:
          VERSION: ${{ inputs.version || github.event.release.tag_name }}
          RELEASE_NAME: ${{ github.event.release.name }}
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          SEMVER="${VERSION#v}"

          awk "/^## \\[${SEMVER}\\]/{found=1; next} /^## \\[/{if(found) exit} found" \
            umh-core/CHANGELOG.md | sed 's/^### /## /' > /tmp/release-body.md

          if [ ! -s /tmp/release-body.md ]; then
            echo "::warning::No changelog content found for ${SEMVER} in umh-core/CHANGELOG.md. GitHub Release body was NOT updated. Add a ## [${SEMVER}] section and re-run this workflow."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # IMPORTANT: Slug generation must match sync-changelog.ts generateSlug()
          # in the changelog.umh.app repo. If that function changes, update this too.
          # Extract title from release event payload (or fetch via gh for workflow_dispatch)
          RAW_TITLE="${RELEASE_NAME:-}"
          if [ -z "$RAW_TITLE" ]; then
            RAW_TITLE=$(gh release view "$VERSION" --json name --jq '.name' 2>/dev/null || echo "")
          fi
          TITLE=$(echo "$RAW_TITLE" | sed -E 's/^v?[0-9]+\.[0-9]+\.[0-9]+[[:space:]]*-[[:space:]]*//')

          if [ -n "$TITLE" ]; then
            # Generate slug (mirrors sync-changelog.ts generateSlug)
            SLUG=$(echo "$TITLE" | tr '[:upper:]' '[:lower:]' | sed -E 's/[^a-z0-9]+/-/g; s/^-//; s/-$//')
            DATE=$(date +%Y-%m-%d)
            echo "" >> /tmp/release-body.md
            echo "See https://changelog.umh.app/changelog/${DATE}-${SLUG}-${VERSION}" >> /tmp/release-body.md
          else
            DATE=$(date +%Y-%m-%d)
            echo "" >> /tmp/release-body.md
            echo "See https://changelog.umh.app/changelog/${DATE}-umh-core-${VERSION}" >> /tmp/release-body.md
          fi

      - name: Update GitHub Release
        if: steps.changelog.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ inputs.version || github.event.release.tag_name }}
        run: |
          set -euo pipefail
          gh release edit "$VERSION" --notes-file /tmp/release-body.md
