name: Pull Request

on:
  workflow_dispatch:
  pull_request:
    branches: ["**"]
  merge_group:

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest # Use GH runner for fast startup, does not need Depot
    permissions:
      contents: read
      pull-requests: read
    outputs:
      code: ${{ steps.filter.outputs.code }}
      changelog: ${{ steps.filter.outputs.changelog }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        id: filter
        with:
          filters: .github/path-filters.yml

  go-analysis:
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    uses: ./.github/workflows/go-analysis.yml

  tests:
    needs: [changes, go-analysis]
    if: ${{ needs.changes.outputs.code == 'true' }}
    uses: ./.github/workflows/test-umh-core.yml
    with:
      run-integration-tests: ${{ github.event_name == 'merge_group' }}
    secrets: inherit
    permissions:
      contents: read
      pull-requests: write

  build:
    needs: [changes, go-analysis]
    if: ${{ needs.changes.outputs.code == 'true' }}
    uses: ./.github/workflows/build-umh-core.yml
    secrets: inherit
    permissions:
      contents: read
      packages: write

  license-eye-header:
    uses: ./.github/workflows/license-eye-header.yaml

  comment-pr:
    name: Comment PR with Image Tag
    needs: [changes, build]
    if: github.event_name == 'pull_request' && needs.changes.outputs.code == 'true'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Compute short SHA
        id: short-sha
        run: echo "SHORT_SHA=$(echo '${{ github.sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Comment image tag on PR
        uses: marocchino/sticky-pull-request-comment@773744901bac0e8cbb5a0dc842800d45e9b2b405 # v2.9.4
        with:
          header: docker-image
          message: |
            **Docker Image Built**

            ```
            ghcr.io/united-manufacturing-hub/umh-core:sha-${{ steps.short-sha.outputs.SHORT_SHA }}
            ```

            Pull with:
            ```bash
            docker pull ghcr.io/united-manufacturing-hub/umh-core:sha-${{ steps.short-sha.outputs.SHORT_SHA }}
            ```

  require-changelog-entry:
    needs: changes
    if: ${{ needs.changes.outputs.code == 'true' }}
    # Use GH runner for fast startup, does not need Depot
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # merge_group: already validated at PR level; workflow_dispatch: no PR context (labels unavailable)
      - name: Require CHANGELOG.md for code changes
        if: >-
          ${{ github.event_name != 'merge_group'
              && github.event_name != 'workflow_dispatch'
              && needs.changes.outputs.changelog != 'true'
              && !contains(github.event.pull_request.labels.*.name, 'skip-changelog-guard') }}
        run: |
          echo "::error::No changes to umh-core/CHANGELOG.md detected."
          echo ""
          echo "This PR modifies code but doesn't include a changelog entry."
          echo "Add an entry under the ## Unreleased section in umh-core/CHANGELOG.md,"
          echo "or add the 'skip-changelog-guard' label if not needed (CI/CD, refactoring, or test-only changes)"
          echo "and push a commit to re-trigger CI."
          echo ""
          echo "See CLAUDE.md > Changelog for entry format and guidelines."
          exit 1

  validate-changelog:
    needs: changes
    if: ${{ needs.changes.outputs.changelog == 'true' }}
    runs-on: depot-ubuntu-24.04
    permissions:
      contents: read
    steps:
      # Check out THIS repo (fetch-depth: 0 fetches all tags + history, needed by
      # the changelog guard for tag lookup and merge-base computation)
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      # Generate token for cross-repo access
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2
        with:
          app-id: ${{ secrets.CHANGELOG_SYNC_APP_ID }}
          private-key: ${{ secrets.CHANGELOG_SYNC_APP_PK }}
          repositories: changelog.umh.app
      # Check out the changelog.umh.app repo
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: united-manufacturing-hub/changelog.umh.app
          token: ${{ steps.app-token.outputs.token }}
          path: changelog-scripts
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
      - name: Check released sections are unmodified
        if: >-
          ${{ github.event_name != 'merge_group'
              && github.event_name != 'workflow_dispatch'
              && !contains(github.event.pull_request.labels.*.name, 'skip-changelog-guard') }}
        shell: bash
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail

          CHANGELOG="umh-core/CHANGELOG.md"

          # Find the latest stable tag (vX.Y.Z, no pre-release suffixes).
          # "|| true": grep exits 1 when no tag matches the stable pattern, which would abort
          # the script under set -euo pipefail (pipefail propagates grep's exit 1 even though
          # head -1 exits 0 after reading empty input).
          LATEST_TAG=$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 || true)

          if [[ -z "$LATEST_TAG" ]]; then
            echo "::warning::No stable tags found — skipping released-section guard"
            exit 0
          fi

          echo "Latest tag: $LATEST_TAG"

          # Compute merge-base between this PR and its target branch.
          # This ensures the guard only catches changes introduced by THIS PR,
          # not formatting/editorial changes that already landed on the base branch.
          if [[ -z "$BASE_REF" ]]; then
            echo "::warning::No base ref available — skipping released-section guard"
            exit 0
          fi
          git fetch origin "$BASE_REF" --no-tags || true
          MERGE_BASE=$(git merge-base "origin/$BASE_REF" HEAD || true)

          if [[ -z "$MERGE_BASE" ]]; then
            echo "::warning::Could not compute merge-base with $BASE_REF — skipping released-section guard"
            exit 0
          fi

          echo "Merge base: $MERGE_BASE"

          HEADER="## [${LATEST_TAG#v}]"

          # Find the header line in the current CHANGELOG (-F = fixed-string to avoid bracket metacharacters, -n = emit line numbers for cut)
          # "|| true": grep exits 1 on no match which would abort the script under set -euo pipefail
          LINE_NUM=$(grep -Fn "$HEADER" "$CHANGELOG" | head -1 | cut -d: -f1 || true)

          if [[ -z "$LINE_NUM" ]]; then
            # Check if merge-base also lacks this header — if so, this PR predates the tag
            BASE_CHECK=$(git show "$MERGE_BASE:$CHANGELOG" 2>/dev/null | grep -Fn "$HEADER" | head -1 | cut -d: -f1 || true)
            if [[ -z "$BASE_CHECK" ]]; then
              echo "::warning::Header '$HEADER' not in current CHANGELOG or merge-base — PR predates tag, skipping guard"
              exit 0
            fi
            echo "::error::Header '$HEADER' not found in current $CHANGELOG but exists in merge-base"
            echo "The released version section was deleted or renamed. If this is intentional,"
            echo "add the 'skip-changelog-guard' label to bypass this check."
            exit 1
          fi

          echo "Found '$HEADER' at line $LINE_NUM"

          # Extract the released tail (from the header line to EOF)
          CURRENT_TAIL=$(tail -n +"$LINE_NUM" "$CHANGELOG")

          # Get the same file from the merge-base commit (2>&1 captures error into variable for the warning)
          if ! BASE_FILE=$(git show "$MERGE_BASE:$CHANGELOG" 2>&1); then
            echo "::warning::Could not read $CHANGELOG from merge-base $MERGE_BASE (git: $BASE_FILE) — skipping guard"
            exit 0
          fi

          # Find the same header in the merge-base version (-F = fixed-string, -n = line numbers; || true for set -e safety)
          BASE_LINE_NUM=$(printf '%s\n' "$BASE_FILE" | grep -Fn "$HEADER" | head -1 | cut -d: -f1 || true)

          if [[ -z "$BASE_LINE_NUM" ]]; then
            echo "::warning::Header '$HEADER' not found in merge-base:$CHANGELOG — skipping guard"
            exit 0
          fi

          # Extract the released tail from the merge-base
          BASE_TAIL=$(printf '%s\n' "$BASE_FILE" | tail -n +"$BASE_LINE_NUM")

          # Compare — use printf '%s' (no trailing newline) so diff is not thrown off by newline differences at EOF.
          # Capture exit code separately: 0=identical, 1=differences, 2=error. Treat 2 as a hard failure.
          DIFF_EXIT=0
          DIFF_OUTPUT=$(diff --unified \
            --label "released (merge-base ${MERGE_BASE:0:10})" \
            --label "current (PR)" \
            <(printf '%s' "$BASE_TAIL") \
            <(printf '%s' "$CURRENT_TAIL")) || DIFF_EXIT=$?

          if [[ "$DIFF_EXIT" -gt 1 ]]; then
            echo "::error::diff failed unexpectedly (exit $DIFF_EXIT)"
            exit 1
          fi

          if [[ -n "$DIFF_OUTPUT" ]]; then
            echo "::group::Diff of released sections"
            echo "$DIFF_OUTPUT"
            echo "::endgroup::"
            echo ""
            echo "::error::Released CHANGELOG sections have been modified!"
            echo ""
            echo "The content below '${HEADER}' differs from the merge-base with ${BASE_REF}."
            echo "This usually happens when a rebase resolves CHANGELOG.md merge conflicts"
            echo "and accidentally moves entries into an already-released version section."
            echo ""
            echo "To fix: move your entries above '${HEADER}' (under the next unreleased version header)."
            echo "To bypass: add the 'skip-changelog-guard' label to this PR (maintainers only)."
            exit 1
          fi

          echo "Released sections unchanged vs merge-base — OK"

          # Informational: warn if the released section on this branch differs from the tag.
          # This happens when a feature branch was forked before the release was tagged.
          # Not an error (the PR didn't cause it), but the branch should be updated eventually.
          # The 2>/dev/null intentionally suppresses git errors (missing file at tag, shallow
          # clone, etc.) — this is a best-effort informational check, not a gate.
          if TAG_CHANGELOG=$(git show "$LATEST_TAG:$CHANGELOG" 2>/dev/null); then
            TAG_LINE=$(printf '%s\n' "$TAG_CHANGELOG" | grep -Fn "$HEADER" | head -1 | cut -d: -f1 || true)
            if [[ -n "$TAG_LINE" ]]; then
              TAG_TAIL=$(printf '%s\n' "$TAG_CHANGELOG" | tail -n +"$TAG_LINE")
              if [[ "$(printf '%s' "$TAG_TAIL")" != "$(printf '%s' "$CURRENT_TAIL")" ]]; then
                echo ""
                echo "::warning file=$CHANGELOG::The '$HEADER' section on this branch differs from the $LATEST_TAG tag. Your branch was forked before the release was tagged. This is not blocking. Merge '$BASE_REF' into '$HEAD_REF' to pick up release-time edits."
              fi
            fi
          fi
      - name: Validate CHANGELOG.md
        run: npx tsx changelog-scripts/.github/scripts/validate-changelog.ts --format version --changelog-path umh-core/CHANGELOG.md

  # Gather results from all required steps
  # Also marks them as "success", if they are "skipped" by paths-filter
  required-checks:
    name: Required Checks
    runs-on: ubuntu-latest # Use GH runner for fast startup, does not need Depot
    needs:
      [
        go-analysis,
        tests,
        build,
        license-eye-header,
        require-changelog-entry,
        validate-changelog,
      ]
    if: always()
    steps:
      - run: echo '${{ toJSON(needs) }}' | jq -e 'to_entries | all(.value.result == "success" or .value.result == "skipped")'
